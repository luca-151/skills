<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8" />
<title>beat · The Turn</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="_shared.css">
<style>
  .h-statement { opacity: 0; }
  .sub { margin-top: 52px; max-width: 820px; opacity: 0; }
</style>
</head><body>
<div class="bg warm"></div>
<div class="stage"></div>
<div class="center">
  <h1 class="h-statement" id="head"></h1>
  <p class="sub" id="sub"></p>
</div>
<script id="beat-spec" type="application/json">
{ "duration": 4.44, "palette": {},
  "turn_slate": "What actually works is [boring.]",
  "turn_sub": "Ingredients with [real clinical evidence.]",
  "cues": { "head": [0.10, 0.70], "sub": [2.18, 2.78] } }
</script>
<script src="_shared.js"></script>
<script>
  const BEAT = loadBeatSpec();
  applyPalette(BEAT.palette);
  const dur = BEAT.duration || 4.44;

  const head = document.getElementById('head');
  const sub = document.getElementById('sub');

  // [square brackets] -> italic emphasis on the head, bold accent on the sub.
  head.innerHTML = (BEAT.turn_slate || '').replace(/\[([^\]]+)\]/g, '<em>$1</em>');
  if (BEAT.turn_sub) {
    sub.innerHTML = BEAT.turn_sub.replace(/\[([^\]]+)\]/g, '<b>$1</b>');
  } else {
    sub.style.display = 'none';
  }

  const headWin = (BEAT.cues && BEAT.cues.head) || [0.10, 0.70];
  const subWin = (BEAT.cues && BEAT.cues.sub) || [dur * 0.49, dur * 0.63];

  initRenderer(dur, function (t) {
    const h = tw(t, headWin[0], headWin[1]);
    head.style.opacity = h;
    head.style.transform = `scale(${0.96 + 0.04 * h})`;
    const s = tw(t, subWin[0], subWin[1]);
    sub.style.opacity = s;
    sub.style.transform = `translateY(${(1 - s) * 26}px)`;
  });
</script>
</body></html>
