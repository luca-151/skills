<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8">
<title>Som v5 · beat-1</title>
<link rel="stylesheet" href="_shared.css">
</head><body>
<div class="stage">
  
  <div class="text-zone" style="position:absolute; top:240px; left:0; right:0; padding:0 70px; text-align:center;">
    <div id="eyebrow" class="eyebrow" style="opacity:0;">Pro-Team Tested</div>
    <div id="rule" class="accent-rule" style="background:#5BB4D9; opacity:0; transform:scaleX(0.3); transform-origin:center;"></div>
    <h1 id="headline" class="h-display" style="opacity:0; transform:translateY(28px);">NSF <em>Certified</em><br>for Sport.</h1>
    <div id="sub" class="body" style="opacity:0; transform:translateY(16px); margin-top:36px;">Independently tested — trusted by 100+ pro sports teams.</div>
  </div>

  <img id="s-berry" class="sachet" src="../../source/sachets/berry.png" style="left:110px; width:230px; bottom:280px; opacity:0;">
  <img id="s-cherry" class="sachet" src="../../source/sachets/cherry.png" style="left:350px; width:230px; bottom:280px; opacity:0;">
  <img id="s-mango" class="sachet" src="../../source/sachets/mango.png" style="left:590px; width:230px; bottom:280px; opacity:0;">
  <img id="s-tangerine" class="sachet" src="../../source/sachets/tangerine.png" style="left:830px; width:230px; bottom:280px; opacity:0;">
  
</div>
<script src="_shared.js"></script>
<script>
  initRenderer(2.4, function (t) {
    // Eyebrow → rule → headline → sub stagger
    { const u = tw_lin(t, 0.10, 0.45); const e = easeOut(u);
       document.getElementById('eyebrow').style.opacity = e; }
    { const u = tw_lin(t, 0.20, 0.55); const e = easeOut(u);
       const el = document.getElementById('rule');
       el.style.opacity = e;
       el.style.transform = `scaleX(${0.3 + 0.7*e})`; }
    { const u = tw_lin(t, 0.30, 0.75); const e = easeOut(u);
       const el = document.getElementById('headline');
       el.style.opacity = e;
       el.style.transform = `translateY(${(1-e)*28}px)`; }
    { const u = tw_lin(t, 0.45, 0.90); const e = easeOut(u);
       const el = document.getElementById('sub');
       el.style.opacity = e;
       el.style.transform = `translateY(${(1-e)*16}px)`; }
    // Sachet entrance
  { const u = tw_lin(t, 0.10, 0.50); const e = easeOut(u); const el = document.getElementById('s-berry'); el.style.opacity = e; el.style.transform = `translateY(${(1-e)*60}px) scale(${0.96+0.04*e})`; }
  { const u = tw_lin(t, 0.16, 0.56); const e = easeOut(u); const el = document.getElementById('s-cherry'); el.style.opacity = e; el.style.transform = `translateY(${(1-e)*60}px) scale(${0.96+0.04*e})`; }
  { const u = tw_lin(t, 0.22, 0.62); const e = easeOut(u); const el = document.getElementById('s-mango'); el.style.opacity = e; el.style.transform = `translateY(${(1-e)*60}px) scale(${0.96+0.04*e})`; }
  { const u = tw_lin(t, 0.28, 0.68); const e = easeOut(u); const el = document.getElementById('s-tangerine'); el.style.opacity = e; el.style.transform = `translateY(${(1-e)*60}px) scale(${0.96+0.04*e})`; }

  });
</script>
</body></html>
